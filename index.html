<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약초 조합 도감</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/50 backdrop-blur sticky top-0 z-50 transition-colors">
        <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div>
                    <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500 flex items-center gap-2">
                        🌿 약초 조합 도감
                    </h1>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1" id="user-greeting">접속 중...</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleTheme()" class="p-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-lg text-sm transition-colors" title="테마 변경">
                        <span id="theme-icon">🌙</span>
                    </button>
                    <button onclick="loginAsAdmin()" id="admin-btn" class="px-3 py-1.5 bg-slate-800 text-white dark:bg-slate-200 dark:text-slate-900 rounded-lg text-xs font-bold transition-colors">
                        🔒 관리자
                    </button>
                </div>
            </div>
            
            <div class="bg-slate-100 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700/60 p-3 rounded-xl w-full sm:w-72 transition-colors">
                <div class="flex justify-between text-xs font-semibold mb-1">
                    <span class="text-slate-600 dark:text-slate-400">전체 탐색 진행도</span>
                    <span id="progress-text" class="text-emerald-600 dark:text-emerald-400">0 / 0 (0.00%)</span>
                </div>
                <div class="w-full bg-slate-300 dark:bg-slate-950 rounded-full h-2 overflow-hidden border border-slate-300 dark:border-slate-800">
                    <div id="progress-bar" class="bg-gradient-to-r from-emerald-500 to-teal-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        
        <section class="w-full md:w-64 flex flex-col gap-6 shrink-0">
            
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 transition-colors">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="font-bold text-sm text-slate-800 dark:text-slate-300 flex items-center gap-1.5">
                        🔍 포함할 약초
                    </h2>
                    <button onclick="resetHerbSelection()" class="text-xs text-rose-500 dark:text-rose-400 hover:underline">초기화</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <div class="text-[11px] font-bold text-amber-600 dark:text-amber-400 mb-1.5 tracking-wider">S 그룹</div>
                        <div class="flex flex-wrap gap-1.5" id="group-S-container"></div>
                    </div>
                    <div>
                        <div class="text-[11px] font-bold text-purple-600 dark:text-purple-400 mb-1.5 tracking-wider">C 그룹</div>
                        <div class="flex flex-wrap gap-1.5" id="group-C-container"></div>
                    </div>
                    <div>
                        <div class="text-[11px] font-bold text-blue-600 dark:text-blue-400 mb-1.5 tracking-wider">B 그룹</div>
                        <div class="flex flex-wrap gap-1.5" id="group-B-container"></div>
                    </div>
                    <div>
                        <div class="text-[11px] font-bold text-emerald-600 dark:text-emerald-400 mb-1.5 tracking-wider">A 그룹</div>
                        <div class="flex flex-wrap gap-1.5" id="group-A-container"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 space-y-4 transition-colors">
                <h2 class="font-bold text-sm text-slate-800 dark:text-slate-300">⚙️ 필터</h2>
                
                <div>
                    <label class="block text-xs text-slate-600 dark:text-slate-400 mb-1.5">개수 선택</label>
                    <select id="filter-count" onchange="filterChange()" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-700 dark:text-slate-200 focus:outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="all">전체보기</option>
                        <option value="3">3개 조합만</option>
                        <option value="4">4개 조합만</option>
                        <option value="5">5개 조합만</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-slate-600 dark:text-slate-400 mb-1.5">체크 상태</label>
                    <select id="filter-status" onchange="filterChange()" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-700 dark:text-slate-200 focus:outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="all">모든 상태</option>
                        <option value="unchecked">미시도 조합만</option>
                        <option value="checked">시도 완료 조합만</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden min-w-0 transition-colors">
            
            <div class="p-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                <div class="text-xs text-slate-600 dark:text-slate-400">
                    검색 결과: <span id="filtered-count" class="text-emerald-600 dark:text-emerald-400 font-bold">0</span>개
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="changePage(-1)" id="btn-prev" class="bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-700 disabled:opacity-30 text-slate-700 dark:text-slate-200 px-2.5 py-1 rounded-md text-xs transition">◀</button>
                    <div class="flex items-center gap-1.5 text-xs text-slate-500 dark:text-slate-300 px-1">
                        <input type="number" id="page-input-top" onchange="goToPage(this.value)" class="w-10 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded py-1 text-center text-emerald-600 dark:text-emerald-400 font-bold focus:outline-none focus:border-emerald-500 transition">
                        <span>/ <span id="total-pages-top">1</span></span>
                    </div>
                    <button onclick="changePage(1)" id="btn-next" class="bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-700 disabled:opacity-30 text-slate-700 dark:text-slate-200 px-2.5 py-1 rounded-md text-xs transition">▶</button>
                </div>
            </div>

            <div class="flex-1 overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="border-b border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 text-xs">
                            <th class="py-3 px-4 font-semibold text-center w-16">완료</th>
                            <th class="py-3 px-4 font-semibold text-center w-16">개수</th>
                            <th class="py-3 px-4 font-semibold">조합 구성품</th>
                            <th class="py-3 px-4 font-semibold text-center w-48">결과 기록</th>
                            <th class="py-3 px-4 font-semibold text-center w-20">수정자</th>
                        </tr>
                    </thead>
                    <tbody id="combination-tbody" class="text-xs divide-y divide-slate-100 dark:divide-slate-800/60">
                        <tr><td colspan="5" class="p-8 text-center text-slate-500">데이터를 불러오는 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_BASE_URL = "https://herb-tracker-api.onrender.com/api";
        
        // 데이터 정의 (점수 제거)
        const herbs = [
            { name: '금향과', group: 'S' }, { name: '빙백설화', group: 'S' }, { name: '월계엽', group: 'S' }, { name: '철목영지', group: 'S' }, { name: '홍련업화', group: 'S' },
            { name: '권엽', group: 'C' }, { name: '금양광초', group: 'C' }, { name: '옥향초', group: 'C' }, { name: '인삼', group: 'C' },
            { name: '백향초', group: 'B' }, { name: '자운초', group: 'B' }, { name: '적주과', group: 'B' }, { name: '황초', group: 'B' }, { name: '흑성과', group: 'B' },
            { name: '녹태', group: 'A' }, { name: '민들레', group: 'A' }, { name: '생강', group: 'A' }, { name: '영군버섯', group: 'A' }, { name: '옥취엽', group: 'A' }
        ];

        const groupStyles = {
            'A': 'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-950 dark:text-emerald-400 dark:border-emerald-800/60',
            'B': 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-950 dark:text-blue-400 dark:border-blue-800/60',
            'C': 'bg-purple-100 text-purple-700 border-purple-200 dark:bg-purple-950 dark:text-purple-400 dark:border-purple-800/60',
            'S': 'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-950 dark:text-amber-400 dark:border-amber-800/60'
        };

        let allCombinations = [];
        let filteredCombinations = [];
        let selectedHerbs = new Set();
        let currentPage = 1;
        const itemsPerPage = 100;

        // 닉네임 및 관리자
        let userNickname = localStorage.getItem("user_nickname");
        if (!userNickname) {
            userNickname = prompt("도감 기여에 사용할 닉네임을 설정해주세요:");
            while (!userNickname || userNickname.trim() === "") userNickname = prompt("닉네임 없이는 이용할 수 없습니다.");
            userNickname = userNickname.trim();
            localStorage.setItem("user_nickname", userNickname);
        }
        let adminToken = localStorage.getItem("admin_token") || "";
        const isAdmin = adminToken === "hanwol123";

        document.getElementById("user-greeting").innerHTML = isAdmin 
            ? `<b>${userNickname}</b>님 <span class="text-emerald-500 font-bold">(관리자)</span>` 
            : `<b>${userNickname}</b>님, 환영합니다.`;
        if (isAdmin) document.getElementById("admin-btn").style.display = "none";

        function loginAsAdmin() {
            const token = prompt("관리자 비밀번호를 입력하세요:");
            if (token === "hanwol123") {
                localStorage.setItem("admin_token", token);
                location.reload();
            } else if (token !== null) alert("비밀번호가 일치하지 않습니다.");
        }

        // 테마 토글 (라이트/다크)
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '🌞' : '🌙';
        }

        window.addEventListener('DOMContentLoaded', () => {
            // 초기 테마 설정
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').innerText = '🌞';
            } else {
                document.getElementById('theme-icon').innerText = '🌙';
            }
            renderHerbSelectionUI();
            fetchCombinations();
        });

        // 좌측 약초 버튼 렌더링
        function renderHerbSelectionUI() {
            herbs.forEach(herb => {
                const container = document.getElementById(`group-${herb.group}-container`);
                const btn = document.createElement('button');
                btn.id = `herb-btn-${herb.name}`;
                btn.className = `border text-xs px-2.5 py-1.5 rounded-lg font-medium transition cursor-pointer flex items-center gap-1 bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-950/40 dark:text-slate-400 dark:border-slate-800`;
                btn.innerText = herb.name;
                btn.onclick = () => toggleHerbSelection(herb.name);
                container.appendChild(btn);
            });
        }

        function extractHerbsText(herbsData) {
            if (Array.isArray(herbsData)) {
                return herbsData.map(h => typeof h === 'object' && h !== null ? Object.values(h)[0] || '' : String(h));
            }
            return String(herbsData || '').split(',').map(s => s.trim());
        }

        // 서버 데이터 불러오기
        async function fetchCombinations() {
            try {
                const response = await fetch(`${API_BASE_URL}/combinations`);
                const rawData = await response.json();
                
                allCombinations = rawData.map(c => ({
                    ...c,
                    parsedHerbs: extractHerbsText(c.herbs)
                }));
                applyFiltersAndRender(true);
            } catch (e) {
                document.getElementById('combination-tbody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500">데이터 로드 실패</td></tr>`;
            }
        }

        // 필터 및 버튼 UI 로직
        function toggleHerbSelection(name) {
            if (selectedHerbs.has(name)) selectedHerbs.delete(name);
            else selectedHerbs.add(name);
            updateHerbButtonStyles();
            applyFiltersAndRender(true);
        }

        function resetHerbSelection() {
            selectedHerbs.clear();
            updateHerbButtonStyles();
            applyFiltersAndRender(true);
        }

        function updateHerbButtonStyles() {
            herbs.forEach(herb => {
                const btn = document.getElementById(`herb-btn-${herb.name}`);
                if (selectedHerbs.has(herb.name)) {
                    btn.className = `border text-xs px-2.5 py-1.5 rounded-lg font-bold transition cursor-pointer flex items-center gap-1 bg-blue-500 text-white border-blue-600 dark:bg-blue-600 dark:border-blue-500`;
                } else {
                    btn.className = `border text-xs px-2.5 py-1.5 rounded-lg font-medium transition cursor-pointer flex items-center gap-1 bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-950/40 dark:text-slate-400 dark:border-slate-800`;
                }
            });
        }

        function filterChange() { applyFiltersAndRender(true); }

        function applyFiltersAndRender(resetPage = false) {
            const filterCount = document.getElementById('filter-count').value;
            const filterStatus = document.getElementById('filter-status').value;

            filteredCombinations = allCombinations.filter(item => {
                if (filterCount !== 'all' && item.count.toString() !== filterCount) return false;
                if (filterStatus === 'checked' && !item.is_checked) return false;
                if (filterStatus === 'unchecked' && item.is_checked) return false;
                if (selectedHerbs.size > 0 && !Array.from(selectedHerbs).every(sh => item.parsedHerbs.includes(sh))) return false;
                return true;
            });

            document.getElementById('filtered-count').innerText = filteredCombinations.length.toLocaleString();
            if (resetPage) currentPage = 1;
            renderTable();
        }

        // 테이블 렌더링
        function renderTable() {
            const tbody = document.getElementById('combination-tbody');
            tbody.innerHTML = '';

            const totalPages = Math.ceil(filteredCombinations.length / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageItems = filteredCombinations.slice(startIndex, startIndex + itemsPerPage);

            if (pageItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-500">조건에 맞는 데이터가 없습니다.</td></tr>`;
            } else {
                pageItems.forEach((item) => {
                    const tr = document.createElement('tr');
                    tr.className = item.is_checked 
                        ? "bg-emerald-50/50 dark:bg-emerald-950/10 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition" 
                        : "hover:bg-slate-50 dark:hover:bg-slate-800/30 transition";

                    // 약초 뱃지 생성
                    let herbBadgesHTML = item.parsedHerbs.map(hName => {
                        const hObj = herbs.find(x => x.name === hName);
                        const style = hObj ? groupStyles[hObj.group] : 'bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
                        return `<span class="inline-block px-1.5 py-0.5 rounded text-[11px] font-medium border ${style}">${hName}</span>`;
                    }).join('<span class="text-slate-400 dark:text-slate-600 text-xs mx-1">+</span>');

                    const modifier = item.last_modified_by || "-";
                    const resultText = item.result_text || "";
                    
                    // 일반 유저는 완료된 항목의 결과 수정 불가
                    const disableInput = (!isAdmin && item.is_checked) ? "disabled" : "";

                    tr.innerHTML = `
                        <td class="py-3 px-4 text-center border-r border-slate-100 dark:border-slate-800/50">
                            <input type="checkbox" id="check-${item.id}" ${item.is_checked ? 'checked' : ''} 
                                onclick="saveRowData('${item.id}')"
                                class="w-4 h-4 rounded text-emerald-500 bg-white dark:bg-slate-950 border-slate-300 dark:border-slate-700 cursor-pointer accent-emerald-500">
                        </td>
                        <td class="py-3 px-4 text-center text-slate-500 dark:text-slate-400 font-medium">${item.count}개</td>
                        <td class="py-3 px-4 font-normal flex flex-wrap items-center gap-y-1">${herbBadgesHTML}</td>
                        <td class="py-3 px-4">
                            <div class="flex gap-2">
                                <input type="text" id="res-${item.id}" value="${resultText}" placeholder="결과를 입력하고 체크하세요" ${disableInput}
                                    class="w-full bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-emerald-500 disabled:opacity-50 disabled:bg-slate-100 dark:disabled:bg-slate-900 transition-colors">
                                ${isAdmin ? `<button onclick="saveRowData('${item.id}', true)" class="px-2 py-1 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded transition-colors whitespace-nowrap">저장</button>` : ''}
                            </div>
                        </td>
                        <td class="py-3 px-4 text-center font-medium text-[11px] text-slate-400 dark:text-slate-500">${modifier}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            document.getElementById('page-input-top').value = currentPage;
            document.getElementById('total-pages-top').innerText = totalPages;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage === totalPages;
            
            updateProgressBar();
        }

        // 데이터 저장 및 동기화 로직
        async function saveRowData(id, forceSave = false) {
            const checkbox = document.getElementById(`check-${id}`);
            const resultInput = document.getElementById(`res-${id}`);
            
            // 일반 유저가 결과를 안 적고 체크하려 할 때 방어
            if (checkbox.checked && !isAdmin && resultInput.value.trim() === "") {
                alert("결과를 먼저 입력하신 후 체크해 주세요!");
                checkbox.checked = false;
                resultInput.focus();
                return;
            }

            checkbox.disabled = true;
            if(!isAdmin) resultInput.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        combo_id: id, 
                        is_checked: checkbox.checked, 
                        nickname: userNickname, 
                        admin_token: adminToken,
                        result_text: resultInput.value.trim()
                    })
                });
                const result = await res.json();
                
                if (result.success) {
                    const found = allCombinations.find(c => c.id === id);
                    if (found) {
                        found.is_checked = checkbox.checked;
                        found.last_modified_by = result.last_modified_by;
                        found.result_text = resultInput.value.trim();
                    }
                    if(forceSave) alert("결과가 수정되었습니다.");
                    applyFiltersAndRender(false); // 페이지 유지
                } else {
                    alert(result.message);
                    checkbox.checked = !checkbox.checked;
                }
            } catch (e) {
                alert("통신 오류가 발생했습니다.");
                checkbox.checked = !checkbox.checked;
            } finally {
                checkbox.disabled = false;
                if(!isAdmin && !checkbox.checked) resultInput.disabled = false;
            }
        }

        // 페이지 조작 로직
        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }

        function goToPage(val) {
            let p = parseInt(val);
            if (isNaN(p) || p < 1) p = 1;
            currentPage = p;
            renderTable();
        }

        function updateProgressBar() {
            const total = allCombinations.length;
            const completed = allCombinations.filter(c => c.is_checked).length;
            const pct = total ? ((completed / total) * 100).toFixed(1) : 0;
            
            document.getElementById('progress-text').innerText = `${completed.toLocaleString()} / ${total.toLocaleString()} (${pct}%)`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }
    </script>
