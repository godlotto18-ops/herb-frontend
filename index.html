<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약초 조합 도감</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col relative">

    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/50 backdrop-blur sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500">🌿 약초 조합 도감</h1>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1" id="user-greeting">접속 중...</p>
            </div>
            
            <div class="bg-slate-100 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700/60 p-2 rounded-xl w-full sm:w-64 transition-colors">
                <div class="flex justify-between text-[11px] font-semibold mb-1">
                    <span class="text-slate-600 dark:text-slate-400">전체 탐색 진행도</span>
                    <span id="progress-text" class="text-emerald-600 dark:text-emerald-400">0 / 0 (0.00%)</span>
                </div>
                <div class="w-full bg-slate-300 dark:bg-slate-950 rounded-full h-1.5 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-emerald-500 to-teal-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>

            <div class="flex gap-2 items-center">
                <button onclick="toggleTheme()" class="p-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-lg text-sm transition">🌙</button>
                <button onclick="loginAsAdmin()" id="admin-btn" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-900 text-white dark:bg-slate-200 dark:text-slate-900 rounded-lg text-xs font-bold transition">🔒 관리자</button>
                <button onclick="logoutAdmin()" id="logout-btn" style="display: none;" class="px-3 py-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-xs font-bold transition">🔓 로그아웃</button>
                <button onclick="openLogsModal()" class="px-3 py-1.5 bg-slate-600 hover:bg-slate-700 text-white rounded-lg text-xs font-bold transition">📜 로그보기</button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        <section class="w-full md:w-64 flex flex-col gap-6 shrink-0">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4">
                <div class="flex justify-between mb-3"><h2 class="font-bold text-sm">🔍 포함할 약초</h2><button onclick="resetHerbSelection()" class="text-xs text-rose-500 hover:underline">초기화</button></div>
                <div class="space-y-4" id="herb-container"></div>
            </div>

            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 space-y-4">
                <h2 class="font-bold text-sm">⚙️ 필터 및 정렬</h2>
                <div>
                    <select id="filter-count" onchange="applyFiltersAndSort()" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none cursor-pointer">
                        <option value="all">개수: 전체보기</option>
                        <option value="3">3개 조합만</option>
                        <option value="4">4개 조합만</option>
                        <option value="5">5개 조합만</option>
                    </select>
                </div>
                <div>
                    <select id="filter-status" onchange="applyFiltersAndSort()" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none cursor-pointer">
                        <option value="all">상태: 모든 상태</option>
                        <option value="unchecked">미시도 조합만</option>
                        <option value="checked">시도 완료 조합만</option>
                    </select>
                </div>
                <div>
                    <select id="sort-type" onchange="applyFiltersAndSort()" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none cursor-pointer">
                        <option value="score_asc" selected>점수 낮은 순 (기본)</option>
                        <option value="score_desc">점수 높은 순</option>
                        <option value="count_asc">재료 개수 순</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden min-w-0">
            <div class="p-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                <span class="text-xs text-slate-600 dark:text-slate-400">검색 결과: <b id="filtered-count" class="text-emerald-600 dark:text-emerald-400">0</b>개</span>
                
                <div class="flex items-center gap-3">
                    <button onclick="changePage(-1)" id="btn-prev" class="flex items-center gap-1 px-3 py-1.5 bg-white dark:bg-[#151b2b] border border-slate-300 dark:border-slate-700/60 rounded-lg text-[13px] font-medium text-slate-600 dark:text-slate-400 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <span class="text-[10px] opacity-70">◀</span> 이전
                    </button>
                    
                    <div class="flex items-center gap-2 text-[13px] font-medium text-slate-600 dark:text-slate-400">
                        <input type="number" id="page-input" onchange="goToPage(this.value)" class="w-12 bg-slate-50 dark:bg-[#0b0f19] border border-slate-300 dark:border-slate-700/80 rounded-lg py-1.5 text-center text-emerald-600 dark:text-emerald-400 font-bold focus:outline-none focus:border-emerald-500 transition-colors" value="1">
                        <span>/ <span id="total-pages">1</span></span>
                    </div>

                    <button onclick="changePage(1)" id="btn-next" class="flex items-center gap-1 px-3 py-1.5 bg-white dark:bg-[#151b2b] border border-slate-300 dark:border-slate-700/60 rounded-lg text-[13px] font-medium text-slate-700 dark:text-slate-200 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        다음 <span class="text-[10px] opacity-70">▶</span>
                    </button>
                </div>
            </div>
            
            <div class="flex-1 overflow-x-auto">
                <table class="w-full text-left text-xs min-w-[750px]">
                    <thead class="bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400">
                        <tr>
                            <th class="py-3 px-4 text-center w-16">완료</th>
                            <th class="py-3 px-4 text-center w-16">개수</th>
                            <th class="py-3 px-4">조합 구성품</th>
                            <th class="py-3 px-4 text-center w-56">결과 기록</th>
                            <th class="py-3 px-4 text-center w-24">수정자</th>
                        </tr>
                    </thead>
                    <tbody id="combination-tbody" class="divide-y divide-slate-100 dark:divide-slate-800/60"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="logs-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-slate-900 w-11/12 max-w-2xl rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50 rounded-t-xl">
                <h3 class="font-bold text-sm">📜 최근 수정 로그 (최대 200개)</h3>
                <button onclick="closeLogsModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">✖</button>
            </div>
            <div class="p-4 overflow-y-auto flex-1 text-xs space-y-2" id="logs-content">
                데이터를 불러오는 중입니다...
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://herb-tracker-api.onrender.com/api";
        const herbs = [
            { name: '금향과', group: 'S' }, { name: '빙백설화', group: 'S' }, { name: '월계엽', group: 'S' }, { name: '철목영지', group: 'S' }, { name: '홍련업화', group: 'S' },
            { name: '권엽', group: 'C' }, { name: '금양광초', group: 'C' }, { name: '옥향초', group: 'C' }, { name: '인삼', group: 'C' },
            { name: '백향초', group: 'B' }, { name: '자운초', group: 'B' }, { name: '적주과', group: 'B' }, { name: '황초', group: 'B' }, { name: '흑성과', group: 'B' },
            { name: '녹태', group: 'A' }, { name: '민들레', group: 'A' }, { name: '생강', group: 'A' }, { name: '영군버섯', group: 'A' }, { name: '옥취엽', group: 'A' }
        ];

        const groupScores = { 'S': 4, 'C': 3, 'B': 2, 'A': 1 }; 
        
        const groupStyles = {
            'A': 'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-950 dark:text-emerald-400 dark:border-emerald-800/60',
            'B': 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-950 dark:text-blue-400 dark:border-blue-800/60',
            'C': 'bg-purple-100 text-purple-700 border-purple-200 dark:bg-purple-950 dark:text-purple-400 dark:border-purple-800/60',
            'S': 'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-950 dark:text-amber-400 dark:border-amber-800/60'
        };

        const btnStylesUnselected = {
            'A': 'bg-emerald-50 text-emerald-600 border-emerald-200 dark:bg-emerald-950/20 dark:text-emerald-400 dark:border-emerald-500/40 hover:bg-emerald-100 dark:hover:bg-emerald-950/50',
            'B': 'bg-blue-50 text-blue-600 border-blue-200 dark:bg-blue-950/20 dark:text-blue-400 dark:border-blue-500/40 hover:bg-blue-100 dark:hover:bg-blue-950/50',
            'C': 'bg-purple-50 text-purple-600 border-purple-200 dark:bg-purple-950/20 dark:text-purple-400 dark:border-purple-500/40 hover:bg-purple-100 dark:hover:bg-purple-950/50',
            'S': 'bg-amber-50 text-amber-600 border-amber-200 dark:bg-amber-950/20 dark:text-amber-400 dark:border-amber-500/40 hover:bg-amber-100 dark:hover:bg-amber-950/50'
        };

        const btnStylesSelected = {
            'A': 'bg-emerald-500 text-white border-emerald-600 dark:bg-emerald-600 dark:border-emerald-500',
            'B': 'bg-blue-500 text-white border-blue-600 dark:bg-blue-600 dark:border-blue-500',
            'C': 'bg-purple-500 text-white border-purple-600 dark:bg-purple-600 dark:border-purple-500',
            'S': 'bg-amber-500 text-white border-amber-600 dark:bg-amber-600 dark:border-amber-500'
        };

        let allCombinations = [], filtered = [], selected = new Set(), currentPage = 1;
        const itemsPerPage = 100;
        
        let userNickname = localStorage.getItem("user_nickname");
        if (!userNickname) {
            userNickname = prompt("도감 기여에 사용할 닉네임을 설정해주세요:");
            while (!userNickname || userNickname.trim() === "") userNickname = prompt("닉네임 없이는 이용할 수 없습니다.");
            userNickname = userNickname.trim();
            localStorage.setItem("user_nickname", userNickname);
        }
        
        const isAdmin = localStorage.getItem("admin_token") === "hanwol123";

        window.onload = () => {
            renderAuthUI();
            renderHerbUI();
            fetchData();
        };

        function renderAuthUI() {
            if (isAdmin) {
                document.getElementById("user-greeting").innerHTML = `<b>${userNickname}</b>님 <span class="text-emerald-500 font-bold">(관리자)</span>`;
                document.getElementById("admin-btn").style.display = "none";
                document.getElementById("logout-btn").style.display = "block";
            } else {
                document.getElementById("user-greeting").innerHTML = `<b>${userNickname}</b>님, 환영합니다.`;
                document.getElementById("admin-btn").style.display = "block";
                document.getElementById("logout-btn").style.display = "none";
            }
        }

        function renderHerbUI() {
            const cont = document.getElementById('herb-container');
            cont.innerHTML = '';
            ['S','C','B','A'].forEach(g => {
                cont.innerHTML += `<div class="mb-3"><div class="text-[11px] font-bold opacity-60 mb-1.5 tracking-wider">${g} 그룹 (+${groupScores[g]})</div><div id="group-${g}" class="flex flex-wrap gap-1.5"></div></div>`;
                herbs.filter(h => h.group === g).forEach(h => {
                    const isSelected = selected.has(h.name);
                    const btnClass = isSelected ? btnStylesSelected[g] : btnStylesUnselected[g];
                    document.getElementById(`group-${g}`).innerHTML += `<button id="btn-${h.name}" onclick="toggleHerb('${h.name}')" class="border px-2.5 py-1.5 rounded-lg text-xs font-medium transition ${btnClass}">${h.name}</button>`;
                });
            });
        }

        async function fetchData() {
            try {
                const res = await fetch(`${API_BASE_URL}/combinations`);
                allCombinations = (await res.json()).map(c => {
                    const parsed = Array.isArray(c.herbs) ? c.herbs.map(h => typeof h === 'object' ? Object.values(h)[0] : h) : String(c.herbs).split(',');
                    let totalScore = 0;
                    parsed.forEach(hName => {
                        const hObj = herbs.find(x => x.name === hName.trim());
                        if(hObj) totalScore += groupScores[hObj.group];
                    });
                    return { ...c, parsed, totalScore };
                });
                updateProgressBar();
                applyFiltersAndSort();
            } catch (e) {
                document.getElementById('combination-tbody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500">데이터 로드 실패</td></tr>`;
            }
        }

        function toggleHerb(name) {
            if (selected.has(name)) selected.delete(name); else selected.add(name);
            renderHerbUI();
            applyFiltersAndSort();
        }

        function applyFiltersAndSort() {
            const filterCount = document.getElementById('filter-count').value;
            const filterStatus = document.getElementById('filter-status').value;
            const sortType = document.getElementById('sort-type').value;

            filtered = allCombinations.filter(c => {
                if (filterCount !== 'all' && c.count.toString() !== filterCount) return false;
                if (filterStatus === 'checked' && !c.is_checked) return false;
                if (filterStatus === 'unchecked' && c.is_checked) return false;
                if (selected.size > 0 && !Array.from(selected).every(s => c.parsed.includes(s))) return false;
                return true;
            });
            
            filtered.sort((a, b) => {
                let diff = 0;
                if (sortType === 'score_asc') diff = a.totalScore - b.totalScore;
                else if (sortType === 'score_desc') diff = b.totalScore - a.totalScore;
                else if (sortType === 'count_asc') diff = a.count - b.count;
                if (diff === 0) return a.parsed.join('').localeCompare(b.parsed.join(''));
                return diff;
            });

            currentPage = 1;
            render();
        }

        function render() {
            document.getElementById('filtered-count').innerText = filtered.length.toLocaleString();
            
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            document.getElementById('total-pages').innerText = totalPages;
            document.getElementById('page-input').value = currentPage;
            
            document.getElementById('btn-prev').disabled = (currentPage <= 1);
            document.getElementById('btn-next').disabled = (currentPage >= totalPages);

            const tbody = document.getElementById('combination-tbody');
            tbody.innerHTML = '';
            
            const pageData = filtered.slice((currentPage-1) * itemsPerPage, currentPage * itemsPerPage);
            if(pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-500">조건에 맞는 데이터가 없습니다.</td></tr>`;
                return;
            }

            pageData.forEach(c => {
                const canEdit = isAdmin || !c.is_checked || c.last_modified_by === userNickname;
                
                let herbBadgesHTML = c.parsed.map(hName => {
                    const hObj = herbs.find(x => x.name === hName.trim());
                    const style = hObj ? groupStyles[hObj.group] : 'bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
                    return `<span class="inline-block px-1.5 py-0.5 rounded text-[11px] font-medium border ${style}">${hName}</span>`;
                }).join('<span class="text-slate-400 dark:text-slate-600 text-[10px] mx-1">+</span>');

                tbody.innerHTML += `<tr class="${c.is_checked ? 'bg-emerald-50/50 dark:bg-emerald-950/10' : 'hover:bg-slate-50 dark:hover:bg-slate-800/30'}">
                    <td class="py-3 px-4 text-center border-r border-slate-100 dark:border-slate-800/50">
                        <input type="checkbox" ${c.is_checked?'checked':''} ${canEdit?'':'disabled'} onclick="save('${c.id}')" id="check-${c.id}" class="w-4 h-4 accent-emerald-500 cursor-pointer disabled:opacity-50">
                    </td>
                    <td class="py-3 px-4 text-center text-slate-500">${c.count}개</td>
                    <td class="py-3 px-4 font-normal flex flex-wrap items-center gap-y-1">${herbBadgesHTML}</td>
                    <td class="py-3 px-4">
                        <div class="flex gap-2">
                            <input type="text" value="${c.result_text||''}" id="res-${c.id}" ${canEdit?'':'disabled'} placeholder="결과 입력" class="w-full bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded px-2 py-1.5 focus:outline-none focus:border-emerald-500 disabled:opacity-50 disabled:bg-slate-100 dark:disabled:bg-slate-900 transition-colors text-xs">
                            ${isAdmin ? `<button onclick="save('${c.id}', true)" class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded text-xs transition whitespace-nowrap">저장</button>` : ''}
                        </div>
                    </td>
                    <td class="py-3 px-4 text-center text-[11px] text-slate-400 font-medium">${c.last_modified_by||'-'}</td>
                </tr>`;
            });
        }

        // 🌟 에러 핸들링이 강화된 save 함수
        async function save(id, force = false) {
            const checkbox = document.getElementById('check-'+id);
            const isChecked = checkbox.checked;
            const text = document.getElementById('res-'+id).value;
            
            // 일반 사용자는 결과를 안 적으면 통과 안 됨
            if (isChecked && !isAdmin && text.trim() === "") {
                alert("결과를 먼저 입력해주세요!");
                checkbox.checked = false; // 체크 다시 풀기
                return;
            }

            checkbox.disabled = true; // 처리 중 비활성화

            try {
                const res = await fetch(`${API_BASE_URL}/check`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ combo_id: id, is_checked: isChecked, nickname: userNickname, result_text: text, admin_token: localStorage.admin_token || "" })
                });
                
                const data = await res.json();
                if(data.success) {
                    if(force) alert("강제 저장되었습니다.");
                    fetchData(); // 성공 시 새 데이터 불러오기
                } else {
                    // 🌟 에러 발생 시 알림창 띄우고 상태 원상복구!
                    alert("저장에 실패했습니다: " + (data.detail || "서버 오류"));
                    checkbox.checked = !isChecked; // 원래 상태로 되돌림
                    checkbox.disabled = false;
                }
            } catch(e) {
                // 🌟 통신 오류 시에도 상태 원상복구!
                alert("서버와 통신할 수 없습니다. (혹은 API 서버가 꺼져있을 수 있습니다.)");
                checkbox.checked = !isChecked; // 원래 상태로 되돌림
                checkbox.disabled = false;
            }
        }

        function updateProgressBar() {
            const total = allCombinations.length;
            const completed = allCombinations.filter(c => c.is_checked).length;
            const pct = total ? ((completed / total) * 100).toFixed(2) : 0;
            
            document.getElementById('progress-text').innerText = `${completed.toLocaleString()} / ${total.toLocaleString()} (${pct}%)`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        async function openLogsModal() {
            document.getElementById('logs-modal').classList.remove('hidden');
            const content = document.getElementById('logs-content');
            content.innerHTML = '<div class="text-center py-4">불러오는 중...</div>';
            
            try {
                const res = await fetch(`${API_BASE_URL}/logs`);
                const logs = await res.json();
                
                if (logs.length === 0) {
                    content.innerHTML = '<div class="text-center py-4 text-slate-500">아직 기록된 로그가 없습니다.</div>';
                    return;
                }

                let html = '';
                logs.forEach(l => {
                    const time = new Date(l.timestamp).toLocaleString();
                    const herbsClean = l.herbs.replace(/[{}"']/g, '').split(':')[1] || l.herbs;
                    
                    const rollbackBtn = isAdmin 
                        ? `<button onclick="executeRollback(${l.log_id})" class="px-2 py-1 bg-rose-50 text-rose-600 border border-rose-200 dark:bg-rose-950/30 dark:border-rose-900 rounded hover:bg-rose-100 transition whitespace-nowrap text-[10px]">이전 상태로 복구</button>`
                        : ``;

                    html += `
                    <div class="bg-slate-100 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-200 dark:border-slate-700 flex justify-between items-center gap-4">
                        <div>
                            <div class="text-[10px] text-slate-500 mb-1">${time}</div>
                            <div><b class="text-emerald-600 dark:text-emerald-400">${l.nickname}</b>님이 <b>[${l.action}]</b> 함</div>
                            <div class="text-slate-500 truncate max-w-[200px] sm:max-w-xs mt-0.5">${herbsClean}</div>
                        </div>
                        ${rollbackBtn}
                    </div>`;
                });
                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = '<div class="text-center py-4 text-red-500">로그를 불러올 수 없습니다.</div>';
            }
        }

        function closeLogsModal() {
            document.getElementById('logs-modal').classList.add('hidden');
        }

        async function executeRollback(logId) {
            if (!confirm("이 작업이 실행되기 직전의 상태로 해당 조합을 되돌리시겠습니까?")) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/rollback`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ log_id: logId, admin_token: localStorage.admin_token })
                });
                
                const result = await res.json();
                if (result.success) {
                    alert("성공적으로 복구되었습니다.");
                    closeLogsModal();
                    fetchData();
                } else {
                    alert(result.detail || "복구 실패");
                }
            } catch (e) {
                alert("통신 오류가 발생했습니다.");
            }
        }

        function loginAsAdmin() {
            const token = prompt("관리자 비밀번호를 입력하세요:");
            if (token === "hanwol123") {
                localStorage.setItem("admin_token", token);
                location.reload();
            } else if (token !== null) alert("비밀번호가 일치하지 않습니다.");
        }

        function logoutAdmin() {
            if (confirm("관리자 모드에서 로그아웃 하시겠습니까?")) {
                localStorage.removeItem("admin_token");
                location.reload();
            }
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function resetHerbSelection() { selected.clear(); applyFiltersAndSort(); renderHerbUI(); }
        
        function goToPage(p) { 
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            let page = parseInt(p) || 1;
            currentPage = Math.max(1, Math.min(totalPages, page));
            render(); 
        }
        
        function changePage(d) { 
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            currentPage = Math.max(1, Math.min(totalPages, currentPage + d));
            render(); 
        }
    </script>
</body>
</html>
